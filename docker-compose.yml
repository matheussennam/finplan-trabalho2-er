services:
  mysql:
    image: mysql:8.4
    container_name: finplan-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: sennaatividadedeelton
      MYSQL_DATABASE: finplan_db
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./script.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  mysql_data:
