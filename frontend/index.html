<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPlan | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background:
                radial-gradient(1200px 700px at 15% 0%, rgba(59,130,246,.28), transparent 70%),
                radial-gradient(900px 600px at 85% 100%, rgba(14,165,233,.22), transparent 70%),
                #020617;
            color: #e2e8f0;
        }
        .glass { background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen flex items-center justify-center p-4">
        <section class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 rounded-3xl overflow-hidden border border-slate-700 glass shadow-2xl">
            <div class="p-10 bg-gradient-to-b from-slate-900/70 to-slate-950/40 border-r border-slate-700">
                <h1 class="text-4xl font-bold text-white flex items-center gap-3">
                    <i class="fas fa-wallet text-blue-500"></i> FinPlan
                </h1>
                <p class="mt-6 text-slate-300 text-xl leading-relaxed">
                    Controle de receitas, despesas e metas com um painel financeiro completo.
                </p>
                <ul class="mt-8 space-y-3 text-slate-300">
                    <li><i class="fas fa-check text-emerald-400 mr-2"></i> Dashboard consolidado</li>
                    <li><i class="fas fa-check text-emerald-400 mr-2"></i> Gestão de transações</li>
                    <li><i class="fas fa-check text-emerald-400 mr-2"></i> Metas financeiras e relatórios</li>
                </ul>
            </div>

            <div class="p-10">
                <h2 class="text-3xl font-bold text-white">Acesso ao sistema</h2>
                <p class="mt-2 text-slate-400">Entre para abrir o painel financeiro.</p>

                <form id="formLogin" class="mt-8 space-y-4">
                    <div>
                        <label for="usuario" class="block text-sm text-slate-400 mb-1">Usuário</label>
                        <input id="usuario" name="usuario" type="text" required value="aluno"
                               class="w-full bg-slate-900 text-white rounded-xl px-4 py-3 border border-slate-700 focus:border-blue-500 focus:outline-none" />
                    </div>
                    <div>
                        <label for="senha" class="block text-sm text-slate-400 mb-1">Senha</label>
                        <input id="senha" name="senha" type="password" required value="123456"
                               class="w-full bg-slate-900 text-white rounded-xl px-4 py-3 border border-slate-700 focus:border-blue-500 focus:outline-none" />
                    </div>

                    <button type="submit"
                            class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-semibold py-3 rounded-xl transition">
                        Entrar
                    </button>
                </form>

                <p id="mensagemLogin" class="mt-4 text-sm text-slate-400"></p>
                <p class="mt-6 text-sm text-slate-500">Demo: usuário <strong>aluno</strong> / senha <strong>123456</strong></p>
            </div>
        </section>
    </main>

    <script src="js/app.js?v=20260530"></script>
</body>
</html>
